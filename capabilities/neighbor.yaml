naftiko: 1.0.0-alpha2
info:
  label: Neighbor API
  description: 'Neighbor API. 2 operations. Lead operation: Get reservation report. Self-contained Naftiko capability covering
    one Neighbor business surface.'
  tags:
  - Neighbor
  - Neighbor API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NEIGHBOR_API_KEY: NEIGHBOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: neighbor
    baseUri: https://api.neighbor.com
    description: Neighbor API business capability. Self-contained, no shared references.
    resources:
    - name: public-reports-reservation
      path: /public/reports/reservation
      operations:
      - name: getreservationreport
        method: GET
        description: Get reservation report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: public-reports-transfer
      path: /public/reports/transfer
      operations:
      - name: gettransferreport
        method: GET
        description: Get transfer/payout report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: year
          in: query
          type: integer
        - name: month
          in: query
          type: integer
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.NEIGHBOR_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: neighbor-rest
    port: 8080
    description: REST adapter for Neighbor API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/public/reports/reservation
      name: public-reports-reservation
      description: REST surface for public-reports-reservation.
      operations:
      - method: GET
        name: getreservationreport
        description: Get reservation report
        call: neighbor.getreservationreport
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/public/reports/transfer
      name: public-reports-transfer
      description: REST surface for public-reports-transfer.
      operations:
      - method: GET
        name: gettransferreport
        description: Get transfer/payout report
        call: neighbor.gettransferreport
        with:
          year: rest.year
          month: rest.month
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: neighbor-mcp
    port: 9090
    transport: http
    description: MCP adapter for Neighbor API. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: get-reservation-report
      description: Get reservation report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: neighbor.getreservationreport
      outputParameters:
      - type: object
        mapping: $.
    - name: get-transfer-payout-report
      description: Get transfer/payout report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: neighbor.gettransferreport
      with:
        year: tools.year
        month: tools.month
      outputParameters:
      - type: object
        mapping: $.
